<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TahminArena - Giriş</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

  <header class="auth-header">
    <div class="logo">
      <i class="fas fa-chart-line"></i>
      <span>TahminArena</span>
    </div>
    <nav class="auth-nav">
      <a href="index.html" class="active">Giriş Yap</a>
      <a href="register.html">Kayıt Ol</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-icon">
        <i class="fas fa-user-circle"></i>
      </div>
      <h2>Hoş Geldiniz</h2>
      <p class="auth-sub">Hesabınıza giriş yaparak analizlere erişin</p>

      <form id="loginForm">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> E-posta</label>
          <input type="email" id="loginEmail" placeholder="ornek@email.com" required>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Şifre</label>
          <div class="pass-wrap">
            <input type="password" id="loginPass" placeholder="••••••" required>
            <span class="toggle-pass" onclick="togglePass('loginPass', this)">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-row">
          <label class="check-label">
            <input type="checkbox"> Beni hatırla
          </label>
          <a href="#" class="forgot-link">Şifremi unuttum</a>
        </div>

        <p class="error-msg" id="loginError"></p>

        <button type="submit" class="btn-primary">
          <i class="fas fa-sign-in-alt"></i> Giriş Yap
        </button>
      </form>

      <div class="auth-footer">
        Hesabınız yok mu? <a href="register.html">Kayıt olun</a>
      </div>
    </div>

    <div class="features-grid">
      <div class="feature-card">
        <i class="fas fa-robot"></i>
        <h4>Yapay Zeka Analizi</h4>
        <p>Gelişmiş AI ile maç tahminleri</p>
      </div>
      <div class="feature-card">
        <i class="fas fa-chart-line"></i>
        <h4>Canlı İstatistikler</h4>
        <p>Anlık maç verileri ve oranlar</p>
      </div>
      <div class="feature-card">
        <i class="fas fa-trophy"></i>
        <h4>Premium Kuponlar</h4>
        <p>%90+ başarı oranlı tahminler</p>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
