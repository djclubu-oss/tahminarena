<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TahminArena - Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .admin-card h3 {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--bg-input);
      border-radius: var(--radius);
    }
    .user-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .user-name {
      font-weight: 600;
    }
    .user-email {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .user-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-premium {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent);
    }
    .badge-free {
      background: var(--bg-dark);
      color: var(--text-muted);
    }
    .btn-action {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    .btn-action:hover {
      opacity: 0.8;
    }
    .btn-make-premium {
      background: var(--accent);
      color: #000;
    }
    .btn-remove-premium {
      background: var(--red);
      color: #fff;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: var(--bg-input);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
    }
    .stat-box .number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-box .label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="auth-body">

  <header class="auth-header">
    <div class="logo">
      <i class="fas fa-chart-line"></i>
      <span>TahminArena - Admin</span>
    </div>
    <nav class="auth-nav">
      <a href="dashboard.html">Panele Dön</a>
      <a href="#" onclick="logout()">Çıkış Yap</a>
    </nav>
  </header>

  <div class="admin-container">
    <div class="admin-header">
      <h1><i class="fas fa-cog"></i> Admin Panel</h1>
      <span id="adminName">Admin</span>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="number" id="totalUsers">0</div>
        <div class="label">Toplam Kullanıcı</div>
      </div>
      <div class="stat-box">
        <div class="number" id="premiumUsers">0</div>
        <div class="label">Premium Üye</div>
      </div>
      <div class="stat-box">
        <div class="number" id="freeUsers">0</div>
        <div class="label">Ücretsiz Üye</div>
      </div>
    </div>

    <div class="admin-card">
      <h3><i class="fas fa-users"></i> Kullanıcı Yönetimi</h3>
      <div class="user-list" id="userList">
        <div class="loading-state">Kullanıcılar yükleniyor...</div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check admin access
    if (!authService.isAdmin()) {
      window.location.href = 'dashboard.html';
    }

    // Load admin info
    const user = authService.getCurrentUser();
    document.getElementById('adminName').textContent = user.name;

    // Load users
    function loadUsers() {
      const users = authService.getUsers();
      const container = document.getElementById('userList');
      
      // Update stats
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('premiumUsers').textContent = users.filter(u => u.premium).length;
      document.getElementById('freeUsers').textContent = users.filter(u => !u.premium).length;

      if (users.length === 0) {
        container.innerHTML = '<div class="empty-state">Henüz kayıtlı kullanıcı yok.</div>';
        return;
      }

      container.innerHTML = users.map(user => `
        <div class="user-item">
          <div class="user-info">
            <span class="user-name">${user.name}</span>
            <span class="user-email">${user.email}</span>
          </div>
          <div class="user-status">
            <span class="badge ${user.premium ? 'badge-premium' : 'badge-free'}">
              ${user.premium ? '⭐ Premium' : 'Ücretsiz'}
            </span>
            ${user.email !== ADMIN_EMAIL ? `
              <button 
                class="btn-action ${user.premium ? 'btn-remove-premium' : 'btn-make-premium'}"
                onclick="togglePremium('${user.email}')"
              >
                ${user.premium ? 'Premium Kaldır' : 'Premium Yap'}
              </button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    // Toggle premium status
    function togglePremium(email) {
      const user = authService.getUsers().find(u => u.email === email);
      if (user.premium) {
        authService.removePremium(email);
      } else {
        authService.makePremium(email);
      }
      loadUsers();
    }

    // Load on page load
    loadUsers();
  </script>
</body>
</html>
